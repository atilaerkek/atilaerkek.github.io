<script>
    // =============================================
    // FIREBASE KONFİGÜRASYONU (sizin mevcut config)
    // =============================================
    const firebaseConfig = {
        apiKey: "AIzaSyBhgu-i_ccA6bZK3GGMKaLCJSsPRx6IC_Q",
        authDomain: "myurlsaver.firebaseapp.com",
        projectId: "myurlsaver",
        storageBucket: "myurlsaver.firebasestorage.app",
        messagingSenderId: "210165524766",
        appId: "1:210165524766:web:deadeb5bf603b79736010f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // =============================================
    // VERİLERİ FIREBASE'DEN ÇEK
    // =============================================
    let rawData = [];
    let ilceOzetData = { ANAMUR: {}, BOZYAZI: {} };
    let uniqueKurumTurleri = [];

    window.addEventListener('load', function() {
        loadData();
        setInterval(loadData, 5 * 60 * 1000); // 5 dakikada bir otomatik yenile
    });

    async function loadData() {
        try {
            document.getElementById('status').innerHTML = '🔄 Veriler yükleniyor...';

            // Firestore'dan okul verilerini çek
            const okulSnapshot = await db.collection("envanter_okullar").get();
            rawData = [];
            okulSnapshot.forEach(doc => {
                const data = doc.data();
                rawData.push({
                    ilce: data.ilce || '',
                    kurumAdi: data.kurumAdi || '',
                    kurumTuru: data.kurumTuru || 'Diğer',
                    faz1: data.faz1 || 0,
                    faz2: data.faz2 || 0,
                    faz3Arcelik: data.faz3Arcelik || 0,
                    faz3Aidata: data.faz3Aidata || 0,
                    toplamET: data.toplamET || 0,
                    btLabSayisi: data.btLabSayisi || 0,
                    btLabBilgisayar: data.btLabBilgisayar || 0,
                    internet: data.internet || '0'
                });
            });

            // Özet verilerini çek
            const ozetDoc = await db.collection("envanter_ozet").doc("istatistikler").get();
            if (ozetDoc.exists) {
                ilceOzetData = ozetDoc.data();
            }

            // Kurum türlerini güncelle
            updateKurumTuruFilter();
            updateSummaries();
            renderTable();

            document.getElementById('status').innerHTML = `✅ Son güncelleme: ${new Date().toLocaleString('tr-TR')}`;

        } catch (error) {
            console.error('Hata:', error);
            document.getElementById('status').innerHTML = '❌ Veri alınamadı!';
        }
    }

    // Bu fonksiyonları da ekleyin (daha önceki kodunuzda varsa aynen kullanın)
    // updateKurumTuruFilter(), updateSummaries(), renderTable(), filterData(), toggleDetail()
</script>
