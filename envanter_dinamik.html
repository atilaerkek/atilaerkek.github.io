<script>
    // =============================================
    // GOOGLE SHEETS ID - SADECE BUNU GÜNCELLEYİN
    // =============================================
    const SPREADSHEET_ID = '2PACX-1vQJwf-VYKADvh1hPpoLQilHrTthG-Ig5H-gyTeP75svYqiMt8HTbUAJKO1eLH1BgzLKWZUKYaujqkZn';
    const OKUL_OZET_GID = '1883249581';
    const ILCE_OZET_GID = '1351961907';

    // =============================================
    // YEDEK VERİLER (İlçe özet için)
    // =============================================
    const BACKUP_OZET = {
        ANAMUR: { adsl: 26, fatih: 12, uydu: 2, yok: 20, tablet: 1395, yazici: 38, kamera: 4, zKutuphane: 4 },
        BOZYAZI: { adsl: 15, fatih: 10, uydu: 0, yok: 6, tablet: 405, yazici: 21, kamera: 2, zKutuphane: 1 }
    };

    let rawData = [];
    let filteredData = [];
    let ilceOzet = { ANAMUR: {}, BOZYAZI: {} };

    window.addEventListener('load', function() {
        loadData();
        setInterval(loadData, 5 * 60 * 1000);
    });

    async function loadData() {
        try {
            document.getElementById('status').innerHTML = '🔄 Veriler yükleniyor...';
            hideError();

            await loadOkulData();
            await loadIlceData();

            document.getElementById('status').innerHTML = `✅ Son güncelleme: ${new Date().toLocaleString('tr-TR')} (${rawData.length} okul)`;
            
            updateKurumTuruFilter();
            updateSummaries();
            filterData();

        } catch (error) {
            console.error('Hata:', error);
            showError('Veriler yüklenirken hata oluştu. Yedek veriler gösteriliyor.');
            document.getElementById('status').innerHTML = '⚠️ Yedek veriler gösteriliyor';
            loadBackupData();
        }
    }

    async function loadOkulData() {
        const url = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=${OKUL_OZET_GID}&single=true&output=csv`;
        
        const response = await fetch(url);
        const csvText = await response.text();
        
        const lines = csvText.split('\n');
        rawData = [];
        
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            
            const values = lines[i].split(',').map(v => v.replace(/"/g, '').trim());
            if (values.length < 5) continue;
            
            const ilce = values[0] || '';
            if (ilce === 'ANAMUR' || ilce === 'BOZYAZI') {
                rawData.push({
                    ilce: ilce,
                    kurumAdi: values[2] || '',
                    kurumTuru: values[3] || 'Diğer',
                    faz1: parseInt(values[4]) || 0,
                    faz2: parseInt(values[5]) || 0,
                    faz3Arcelik: parseInt(values[6]) || 0,
                    faz3Aidata: parseInt(values[7]) || 0,
                    toplamET: parseInt(values[8]) || 0,
                    btLabSayisi: parseInt(values[9]) || 0,
                    btLabBilgisayar: parseInt(values[10]) || 0,
                    internet: values[11] || '0'
                });
            }
        }
    }

    async function loadIlceData() {
        const url = `https://docs.google.com/spreadsheets/d/e/${SPREADSHEET_ID}/pub?gid=${ILCE_OZET_GID}&single=true&output=csv`;
        
        const response = await fetch(url);
        const csvText = await response.text();
        
        const lines = csvText.split('\n');
        
        // İlk satır başlıklar
        const headers = lines[0].split(',').map(h => h.replace(/"/g, '').trim());
        console.log('İlçe Özet Başlıklar:', headers);
        
        // ADSL, FATİH_VPN, VSAT_UYDU, İNTERNET_YOK sütunlarının indekslerini bul
        let adslIndex = -1, fatihIndex = -1, uyduIndex = -1, yokIndex = -1;
        
        headers.forEach((header, index) => {
            if (header.includes('ADSL') || header.includes('MEB_ADSL')) adslIndex = index;
            if (header.includes('FATİH') || header.includes('FATIH')) fatihIndex = index;
            if (header.includes('VSAT') || header.includes('UYDU')) uyduIndex = index;
            if (header.includes('YOK') || header.includes('INTERNET_YOK')) yokIndex = index;
        });
        
        console.log('Bulunan indeksler:', { adslIndex, fatihIndex, uyduIndex, yokIndex });
        
        // Verileri oku
        for (let i = 1; i < lines.length; i++) {
            if (!lines[i].trim()) continue;
            
            const values = lines[i].split(',').map(v => v.replace(/"/g, '').trim());
            if (values.length < 2) continue;
            
            const ilce = values[0];
            if (ilce === 'ANAMUR' || ilce === 'BOZYAZI') {
                ilceOzet[ilce] = {
                    adsl: adslIndex !== -1 ? parseInt(values[adslIndex]) || 0 : 0,
                    fatih: fatihIndex !== -1 ? parseInt(values[fatihIndex]) || 0 : 0,
                    uydu: uyduIndex !== -1 ? parseInt(values[uyduIndex]) || 0 : 0,
                    yok: yokIndex !== -1 ? parseInt(values[yokIndex]) || 0 : 0,
                    tablet: parseInt(values[5]) || 0, // Genelde 6. sütun
                    yazici: parseInt(values[6]) || 0,  // Genelde 7. sütun
                    kamera: parseInt(values[7]) || 0,  // Genelde 8. sütun
                    zKutuphane: parseInt(values[8]) || 0 // Genelde 9. sütun
                };
                
                console.log(ilce + ' özet:', ilceOzet[ilce]);
            }
        }
        
        // Eğer indeksler bulunamadıysa veya değerler 0'sa, yedek verileri kullan
        if (adslIndex === -1 || 
            (ilceOzet.ANAMUR && ilceOzet.ANAMUR.adsl === 0 && 
             ilceOzet.ANAMUR.fatih === 0 && 
             ilceOzet.ANAMUR.uydu === 0 && 
             ilceOzet.ANAMUR.yok === 0)) {
            console.log('İnternet verileri bulunamadı, yedek kullanılıyor');
            ilceOzet = BACKUP_OZET;
        }
    }

    function loadBackupData() {
        rawData = [
            {ilce: "ANAMUR", kurumAdi: "Anamur Anadolu Lisesi", kurumTuru: "Anadolu Lisesi", faz1:0, faz2:0, faz3Arcelik:24, faz3Aidata:0, toplamET:24, btLabSayisi:0, btLabBilgisayar:0, internet: "MEB_ADSL"},
            {ilce: "ANAMUR", kurumAdi: "Akdeniz İlkokulu", kurumTuru: "İlkokul", faz1:0, faz2:23, faz3Arcelik:0, faz3Aidata:0, toplamET:23, btLabSayisi:0, btLabBilgisayar:0, internet: "MEB_ADSL"},
            {ilce: "BOZYAZI", kurumAdi: "Bozyazı Anadolu Lisesi", kurumTuru: "Anadolu Lisesi", faz1:0, faz2:32, faz3Arcelik:0, faz3Aidata:0, toplamET:32, btLabSayisi:0, btLabBilgisayar:0, internet: "MEB_ADSL"}
        ];
        
        ilceOzet = BACKUP_OZET;
        
        updateKurumTuruFilter();
        updateSummaries();
        filterData();
    }

    function updateKurumTuruFilter() {
        const turSet = new Set();
        rawData.forEach(r => {
            if (r.kurumTuru) turSet.add(r.kurumTuru);
        });
        
        const select = document.getElementById('kurumTuruFilter');
        select.innerHTML = '<option value="TÜMÜ">Tüm Kurumlar</option>';
        Array.from(turSet).sort().forEach(tur => {
            select.innerHTML += `<option value="${tur}">${tur}</option>`;
        });
    }

    function updateSummaries() {
        const anamurData = rawData.filter(r => r.ilce === 'ANAMUR');
        const bozyaziData = rawData.filter(r => r.ilce === 'BOZYAZI');

        document.getElementById('anamurCount').innerText = anamurData.length + ' Kurum';
        document.getElementById('anamurET').innerText = anamurData.reduce((acc, r) => acc + r.toplamET, 0);
        document.getElementById('anamurF1').innerText = anamurData.reduce((acc, r) => acc + r.faz1, 0);
        document.getElementById('anamurF2').innerText = anamurData.reduce((acc, r) => acc + r.faz2, 0);
        document.getElementById('anamurF3A').innerText = anamurData.reduce((acc, r) => acc + r.faz3Arcelik, 0);
        document.getElementById('anamurF3Ai').innerText = anamurData.reduce((acc, r) => acc + r.faz3Aidata, 0);

        document.getElementById('bozyaziCount').innerText = bozyaziData.length + ' Kurum';
        document.getElementById('bozyaziET').innerText = bozyaziData.reduce((acc, r) => acc + r.toplamET, 0);
        document.getElementById('bozyaziF1').innerText = bozyaziData.reduce((acc, r) => acc + r.faz1, 0);
        document.getElementById('bozyaziF2').innerText = bozyaziData.reduce((acc, r) => acc + r.faz2, 0);
        document.getElementById('bozyaziF3A').innerText = bozyaziData.reduce((acc, r) => acc + r.faz3Arcelik, 0);
        document.getElementById('bozyaziF3Ai').innerText = bozyaziData.reduce((acc, r) => acc + r.faz3Aidata, 0);

        // İnternet istatistiklerini güncelle - YEDEK verileri kullan
        document.getElementById('anamurAdsl').innerText = ilceOzet.ANAMUR?.adsl || BACKUP_OZET.ANAMUR.adsl;
        document.getElementById('anamurFatih').innerText = ilceOzet.ANAMUR?.fatih || BACKUP_OZET.ANAMUR.fatih;
        document.getElementById('anamurUydu').innerText = ilceOzet.ANAMUR?.uydu || BACKUP_OZET.ANAMUR.uydu;
        document.getElementById('anamurYok').innerText = ilceOzet.ANAMUR?.yok || BACKUP_OZET.ANAMUR.yok;

        document.getElementById('bozyaziAdsl').innerText = ilceOzet.BOZYAZI?.adsl || BACKUP_OZET.BOZYAZI.adsl;
        document.getElementById('bozyaziFatih').innerText = ilceOzet.BOZYAZI?.fatih || BACKUP_OZET.BOZYAZI.fatih;
        document.getElementById('bozyaziUydu').innerText = ilceOzet.BOZYAZI?.uydu || BACKUP_OZET.BOZYAZI.uydu;
        document.getElementById('bozyaziYok').innerText = ilceOzet.BOZYAZI?.yok || BACKUP_OZET.BOZYAZI.yok;
    }

    function filterData() {
        const ilce = document.getElementById('ilceFilter').value;
        const tur = document.getElementById('kurumTuruFilter').value;
        const internet = document.getElementById('internetFilter').value;
        const arama = document.getElementById('aramaInput').value.toLowerCase();

        filteredData = rawData.filter(r => {
            if (ilce !== 'TÜMÜ' && r.ilce !== ilce) return false;
            if (tur !== 'TÜMÜ' && r.kurumTuru !== tur) return false;
            if (internet !== 'TÜMÜ') {
                if (internet === '0' && r.internet !== '0') return false;
                if (internet !== '0' && r.internet !== internet) return false;
            }
            if (arama && !r.kurumAdi.toLowerCase().includes(arama)) return false;
            return true;
        });

        renderTable();
    }

    function renderTable() {
        const ilceler = [...new Set(filteredData.map(r => r.ilce))].sort();

        let html = '';

        if (filteredData.length === 0) {
            html = '<tr><td colspan="11" class="info-message">📌 Okul bulunamadı</td></tr>';
        } else {
            ilceler.forEach(ilce => {
                const okullar = filteredData.filter(r => r.ilce === ilce);
                const toplamET = okullar.reduce((acc, r) => acc + r.toplamET, 0);
                const toplamLab = okullar.reduce((acc, r) => acc + r.btLabSayisi, 0);
                const toplamBilg = okullar.reduce((acc, r) => acc + r.btLabBilgisayar, 0);

                html += `<tr class="district-row" onclick="toggleDetail('${ilce}')">`;
                html += `<td><span class="toggle-icon" id="icon-${ilce}">▶</span> ${ilce}</td>`;
                html += `<td colspan="2"><strong>${ilce} Toplam (${okullar.length})</strong></td>`;
                html += `<td>${okullar.reduce((acc, r) => acc + r.faz1, 0)}</td>`;
                html += `<td>${okullar.reduce((acc, r) => acc + r.faz2, 0)}</td>`;
                html += `<td>${okullar.reduce((acc, r) => acc + r.faz3Arcelik, 0)}</td>`;
                html += `<td>${okullar.reduce((acc, r) => acc + r.faz3Aidata, 0)}</td>`;
                html += `<td><strong>${toplamET}</strong></td>`;
                html += `<td>${toplamLab}</td>`;
                html += `<td>${toplamBilg}</td>`;
                html += `<td>-</td>`;
                html += `</tr>`;

                html += `<tr class="detail-row" id="detail-${ilce}">`;
                html += `<td colspan="11"><div class="detail-inner">`;
                html += `<table class="detail-table">`;
                html += `<thead><tr><th>Kurum</th><th>Tür</th><th>F1</th><th>F2</th><th>F3A</th><th>F3Ai</th><th>Top</th><th>Lab</th><th>Bilg</th><th>İnternet</th></tr></thead><tbody>`;

                okullar.forEach(o => {
                    let badgeClass = 'diger';
                    if (o.internet === 'MEB_ADSL') badgeClass = 'adsl';
                    else if (o.internet === 'FATİH_VPN') badgeClass = 'fatih';
                    else if (o.internet === 'VSAT_UYDU') badgeClass = 'uydu';

                    html += `<tr>`;
                    html += `<td style="text-align:left">${o.kurumAdi}</td>`;
                    html += `<td style="text-align:left"><span class="badge okul-tur">${o.kurumTuru}</span></td>`;
                    html += `<td>${o.faz1}</td>`;
                    html += `<td>${o.faz2}</td>`;
                    html += `<td>${o.faz3Arcelik}</td>`;
                    html += `<td>${o.faz3Aidata}</td>`;
                    html += `<td><strong>${o.toplamET}</strong></td>`;
                    html += `<td>${o.btLabSayisi}</td>`;
                    html += `<td>${o.btLabBilgisayar}</td>`;
                    html += `<td><span class="badge ${badgeClass}">${o.internet}</span></td>`;
                    html += `</tr>`;
                });

                html += `</tbody></table></div></td></tr>`;
            });
        }

        document.getElementById('tableBody').innerHTML = html;
    }

    function toggleDetail(ilce) {
        const detail = document.getElementById('detail-' + ilce);
        const icon = document.getElementById('icon-' + ilce);
        
        if (detail.style.display === 'table-row') {
            detail.style.display = 'none';
            icon.innerHTML = '▶';
        } else {
            detail.style.display = 'table-row';
            icon.innerHTML = '▼';
        }
    }

    function showError(message) {
        const errorBox = document.getElementById('errorBox');
        errorBox.innerHTML = message;
        errorBox.style.display = 'block';
    }

    function hideError() {
        document.getElementById('errorBox').style.display = 'none';
    }
</script>
